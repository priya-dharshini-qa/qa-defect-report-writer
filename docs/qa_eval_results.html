const EVALS = [
  {
    id: 1, title: "Vague one-liner",
    purpose: "Complete report from minimal input.",
    checks: [
      { label: "Produces a full report — does not halt to ask clarifying questions", fn: r => r.includes("# Defect Report") },
      { label: 'Title describes broken behaviour ("Login Fails" or similar)', fn: r => /# Defect Report:.*[Ll]ogin/i.test(r) },
      { label: "Unknown/missing fields marked Unknown or Not provided — no raw placeholders", fn: r => !r.includes("[App or module name]") && !r.includes("[Version") && !r.includes("[e.g.") },
      { label: "Steps to Reproduce reconstructed with *(inferred)* flags", fn: r => /\*\(inferred\)\*|\*inferred\*/i.test(r) },
      { label: "Environment fields marked *(assumed)* somewhere in output", fn: r => /\*\(assumed\)\*|\*assumed\*/i.test(r) },
      { label: "Severity defaults to High", fn: r => /\*\*High\*\*/i.test(r) },
      { label: "Ends with standard one-line offer to adjust", fn: r => /let me know if you.{0,10}d like to adjust/i.test(r) },
    ]
  },
  {
    id: 2, title: "Multi-bug report",
    purpose: "Separate reports for two distinct bugs.",
    checks: [
      { label: "Produces two separate defect reports", fn: r => (r.match(/# Defect Report:/g)||[]).length >= 2 },
      { label: "Report 1 covers the Safari date picker issue", fn: r => /date.?picker|checkout.*date/i.test(r) },
      { label: "Browser field includes Safari", fn: r => /Safari/i.test(r) },
      { label: "Report 1 severity is Medium or lower", fn: r => { const i1 = r.indexOf("# Defect Report:"); const i2 = r.indexOf("# Defect Report:", i1+1); const block = r.slice(i1, i2 > 0 ? i2 : r.length); return /\*\*(Medium|Low)\*\*/i.test(block); }},
      { label: '"Sometimes" reflected as intermittent', fn: r => /intermittent|sometimes|occasional|not always/i.test(r) },
      { label: "Report 2 severity is High or Critical", fn: r => { const i1 = r.indexOf("# Defect Report:"); const i2 = r.indexOf("# Defect Report:", i1+1); if (i2 < 0) return false; return /\*\*(High|Critical)\*\*/i.test(r.slice(i2)); }},
      { label: 'Actual Result mentions "$0.00"', fn: r => /\$0\.00/i.test(r) },
      { label: "Both reports in markdown code blocks", fn: r => (r.match(/```markdown/g)||[]).length >= 2 },
      { label: "Ends with standard one-line offer to adjust", fn: r => /let me know if you.{0,10}d like to adjust/i.test(r) },
    ]
  },
  {
    id: 3, title: "Detailed well-specified input",
    purpose: "Faithfully uses all provided detail, no over-inference.",
    checks: [
      { label: "Title references Export CSV or Settings > Users", fn: r => /Export CSV|Settings.*Users/i.test((r.match(/# Defect Report:[^\n]*/)||[""])[0]) },
      { label: "Version / Build: v3.2.1 present", fn: r => /v3\.2\.1/i.test(r) },
      { label: "OS / Platform: Windows 11 present", fn: r => /Windows 11/i.test(r) },
      { label: "Browser / Client: Chrome 124 present", fn: r => /Chrome 124/i.test(r) },
      { label: "Test Environment: Staging present", fn: r => /[Ss]taging/i.test(r) },
      { label: "Steps match user input — none flagged *(inferred)*", fn: r => !/\*\(inferred\)\*|\*inferred\*/i.test(r) },
      { label: "Actual Result mentions 500 Internal Server Error", fn: r => /500 Internal Server Error/i.test(r) },
      { label: "Severity is High or Critical", fn: r => /\*\*(High|Critical)\*\*/i.test(r) },
      { label: "Priority is P1 or P2", fn: r => /\*\*(P1|P2)/i.test(r) },
      { label: "Additional Notes includes PROJ-441", fn: r => /PROJ-441/i.test(r) },
      { label: "Notes 100% reproduction rate", fn: r => /100%/i.test(r) },
      { label: "No raw placeholder text remains", fn: r => !r.includes("[App or module name]") && !r.includes("[e.g.") && !r.includes("[Version") },
      { label: "Ends with standard one-line offer to adjust", fn: r => /let me know if you.{0,10}d like to adjust/i.test(r) },
    ]
  }
];

const MODELS = [
  { key: "haiku", label: "Haiku 4.5" },
  { key: "sonnet", label: "Sonnet 4.6" },
];

const showResponse = {};

function score(checks, response) {
  return checks.map(c => { try { return !!c.fn(response); } catch { return false; } });
}

function badgeCls(pass, total) {
  return pass === total ? "score-good" : pass >= Math.ceil(total * 0.7) ? "score-mid" : "score-bad";
}

function totalFor(mkey) {
  let p = 0, t = 0;
  EVALS.forEach(e => {
    const r = RESPONSES[`${mkey}-${e.id}`] || "";
    score(e.checks, r).forEach(v => { if (v) p++; t++; });
  });
  return `${p}/${t}`;
}

function toggleResp(key) {
  showResponse[key] = !showResponse[key];
  render();
}

function render() {
  document.getElementById("h-score").textContent = totalFor("haiku");
  document.getElementById("s-score").textContent = totalFor("sonnet");

  document.getElementById("container").innerHTML = EVALS.map(e => {
    const cols = MODELS.map(m => {
      const key = `${m.key}-${e.id}`;
      const r = RESPONSES[key] || "";
      const scores = score(e.checks, r);
      const pass = scores.filter(Boolean).length;
      const total = scores.length;
      const cls = badgeCls(pass, total);
      const checks = e.checks.map((c, i) =>
        `<div class="check-item">
          <div class="icon ${scores[i] ? "pass" : "fail"}">${scores[i] ? "✓" : "✗"}</div>
          <div class="check-label">${c.label}</div>
        </div>`
      ).join("");
      const showing = showResponse[key];
      const esc = r.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
      return `<div class="model-block">
        <div class="model-header">
          <span class="model-label">${m.label}</span>
          <span class="score-badge ${cls}">${pass}/${total} passed</span>
        </div>
        <div>${checks}</div>
        <span class="response-toggle" onclick="toggleResp('${key}')">${showing ? "Hide" : "Show"} raw response</span>
        ${showing ? `<div class="response-box">${esc}</div>` : ""}
      </div>`;
    }).join("");
    return `<div class="eval-card">
      <div class="eval-header">
        <span class="eval-num">Eval ${e.id}</span>
        <span class="eval-title">${e.title}</span>
      </div>
      <div class="eval-purpose">${e.purpose}</div>
      <div class="model-row">${cols}</div>
    </div>`;
  }).join("");
}

render();
</script>
